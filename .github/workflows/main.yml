name: Aegis Sentinel CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Test Suites
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Standup Services (Docker Compose)
      run: |
        docker compose up -d --build
        # Wait for the API to be ready
        sleep 10
        
    - name: Run Backend Logic Tests (Normalization / SIC)
      run: |
        python model/sanitizer.py
        python model/validation.py
        
    - name: Execute QA Sandbox Suite
      run: |
        python tests/qa_suite.py

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Execute Remote SSH Deployment
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.PROD_HOST_IP }}
        username: ${{ secrets.PROD_USERNAME }}
        key: ${{ secrets.PROD_SSH_KEY }}
        script: |
          cd /opt/sqli_system
          git pull origin main
          docker-compose pull
          docker-compose up -d --build
          echo "Deployment Successful! System Live."
